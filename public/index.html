<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Campaigns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 36px 40px;
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subtitle {
      color: #666;
      font-size: .875rem;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .03em;
      color: #444;
      text-transform: uppercase;
    }

    input, textarea {
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: .9rem;
      transition: border-color .2s;
      outline: none;
      width: 100%;
      font-family: inherit;
    }

    input:focus, textarea:focus { border-color: #25d366; }

    input[type="file"] {
      padding: 7px 10px;
      cursor: pointer;
      background: #fafafa;
    }

    textarea { resize: vertical; min-height: 72px; }

    .hint {
      font-size: .75rem;
      color: #999;
      margin-top: 2px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 24px;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary {
      background: #25d366;
      color: #fff;
      width: 100%;
      margin-top: 24px;
      font-size: 1rem;
      padding: 13px;
    }

    .btn-primary:hover:not(:disabled) { opacity: .9; }

    .btn-download {
      background: #1d6f42;
      color: #fff;
      margin-top: 12px;
      width: 100%;
    }

    /* Progress section */
    #progress-section {
      margin-top: 28px;
      display: none;
    }

    .divider {
      border: none;
      border-top: 1.5px solid #f0f0f0;
      margin-bottom: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: #f7f8fc;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: .72rem;
      color: #777;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-top: 4px;
    }

    .stat.sent   .stat-value { color: #25d366; }
    .stat.errors .stat-value { color: #e53935; }
    .stat.pending .stat-value { color: #fb8c00; }

    .progress-bar-wrap {
      background: #eee;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #25d366, #128c7e);
      border-radius: 99px;
      width: 0%;
      transition: width .3s ease;
    }

    .progress-label {
      font-size: .78rem;
      color: #888;
      text-align: right;
    }

    #status-msg {
      font-size: .85rem;
      color: #555;
      margin: 10px 0 14px;
      min-height: 20px;
    }

    /* Log table */
    .log-wrap {
      max-height: 280px;
      overflow-y: auto;
      border: 1.5px solid #ececec;
      border-radius: 10px;
      font-size: .8rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f7f8fc;
      padding: 8px 10px;
      text-align: left;
      font-size: .72rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #555;
      border-bottom: 1.5px solid #ececec;
    }

    tbody tr:nth-child(even) { background: #fafafa; }

    tbody td {
      padding: 7px 10px;
      vertical-align: middle;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .badge-ok    { background: #e6f9ee; color: #1b7a43; }
    .badge-error { background: #fdecea; color: #c62828; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .85rem;
      margin-top: 12px;
    }

    .alert-error   { background: #fdecea; color: #c62828; }
    .alert-success { background: #e6f9ee; color: #1b7a43; }
  </style>
</head>
<body>
<div class="card">
  <h1>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    WhatsApp Campaigns
  </h1>
  <p class="subtitle">Envio masivo via Meta Cloud API — plantillas aprobadas</p>

  <form id="campaign-form" autocomplete="off">
    <div class="form-grid">

      <div class="field full">
        <label>Archivo CSV</label>
        <input type="file" id="csv-file" name="csv" accept=".csv" required />
        <span class="hint">Debe tener una columna llamada <strong>Telefono</strong> (formato internacional sin +)</span>
      </div>

      <div class="field">
        <label>Media ID (imagen)</label>
        <input type="text" name="mediaId" placeholder="ID de imagen subida a Meta" required />
      </div>

      <div class="field full">
        <label>Texto variable <code style="font-size:.8rem">{{1}}</code></label>
        <textarea name="variableText" placeholder="Texto que reemplazará la variable en el cuerpo de la plantilla" required></textarea>
      </div>

    </div>

    <button type="submit" class="btn btn-primary" id="send-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Iniciar Campana
    </button>

    <div id="form-error" class="alert alert-error" style="display:none"></div>
  </form>

  <!-- Progress section -->
  <div id="progress-section">
    <hr class="divider" />

    <div class="stats">
      <div class="stat sent">
        <div class="stat-value" id="cnt-sent">0</div>
        <div class="stat-label">Enviados</div>
      </div>
      <div class="stat errors">
        <div class="stat-value" id="cnt-errors">0</div>
        <div class="stat-label">Errores</div>
      </div>
      <div class="stat pending">
        <div class="stat-value" id="cnt-pending">0</div>
        <div class="stat-label">Pendientes</div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 0</div>

    <div id="status-msg"></div>

    <div class="log-wrap">
      <table>
        <thead>
          <tr>
            <th>Telefono</th>
            <th>Estado</th>
            <th>Detalle</th>
            <th>Hora</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>

    <button class="btn btn-download" id="download-btn" style="display:none" onclick="downloadLog()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar log CSV
    </button>
  </div>
</div>

<script>
  const form        = document.getElementById('campaign-form');
  const sendBtn     = document.getElementById('send-btn');
  const formError   = document.getElementById('form-error');
  const progressSec = document.getElementById('progress-section');
  const cntSent     = document.getElementById('cnt-sent');
  const cntErrors   = document.getElementById('cnt-errors');
  const cntPending  = document.getElementById('cnt-pending');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const statusMsg   = document.getElementById('status-msg');
  const logBody     = document.getElementById('log-body');
  const downloadBtn = document.getElementById('download-btn');

  let total = 0;
  let es    = null;  // EventSource

  function showError(msg) {
    formError.textContent = msg;
    formError.style.display = 'block';
  }

  function hideError() {
    formError.style.display = 'none';
  }

  function updateStats(sent, errors, pending, tot) {
    total = tot || total;
    cntSent.textContent    = sent;
    cntErrors.textContent  = errors;
    cntPending.textContent = pending;
    const done = sent + errors;
    const pct  = total ? Math.round(done / total * 100) : 0;
    progressBar.style.width = pct + '%';
    progressLbl.textContent = `${done} / ${total}`;
  }

  function addRow(phone, status, detail, ts) {
    const tr = document.createElement('tr');
    const time = new Date(ts).toLocaleTimeString('es-ES');
    tr.innerHTML = `
      <td title="${phone}">${phone}</td>
      <td><span class="badge ${status === 'OK' ? 'badge-ok' : 'badge-error'}">${status}</span></td>
      <td title="${detail}">${detail || '—'}</td>
      <td>${time}</td>
    `;
    logBody.insertBefore(tr, logBody.firstChild); // newest on top
  }

  function connectSSE() {
    if (es) es.close();
    es = new EventSource('/api/events');

    es.addEventListener('status', e => {
      const d = JSON.parse(e.data);
      updateStats(d.sent, d.errors, d.pending, d.total);
    });

    es.addEventListener('start', e => {
      const d = JSON.parse(e.data);
      total = d.total;
      statusMsg.textContent = `Enviando a ${d.total} contactos...`;
      progressSec.style.display = 'block';
    });

    es.addEventListener('progress', e => {
      const d = JSON.parse(e.data);
      updateStats(d.sent, d.errors, d.pending, d.total);
      addRow(d.phone, d.status, d.detail, new Date().toISOString());
    });

    es.addEventListener('done', e => {
      const d = JSON.parse(e.data);
      updateStats(d.sent, d.errors, 0, d.total);
      statusMsg.innerHTML = `<span style="color:#1b7a43;font-weight:600">Campana finalizada.</span> ${d.sent} enviados, ${d.errors} errores.`;
      downloadBtn.style.display = 'flex';
      sendBtn.disabled = false;
      sendBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Iniciar nueva campana`;
      es.close();
    });

    es.addEventListener('error', e => {
      try {
        const d = JSON.parse(e.data);
        statusMsg.textContent = 'Error: ' + d.message;
      } catch {}
    });

    es.onerror = () => {};
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    hideError();

    const csvFile = document.getElementById('csv-file').files[0];
    if (!csvFile) { showError('Selecciona un archivo CSV'); return; }

    const fd = new FormData(form);
    fd.set('csv', csvFile);

    sendBtn.disabled = true;
    sendBtn.textContent = 'Iniciando...';
    downloadBtn.style.display = 'none';
    logBody.innerHTML = '';
    statusMsg.textContent = '';
    progressSec.style.display = 'none';

    connectSSE();

    try {
      const res = await fetch('/api/campaign/start', { method: 'POST', body: fd });
      const json = await res.json();

      if (!res.ok) {
        showError(json.error || 'Error al iniciar la campana');
        sendBtn.disabled = false;
        sendBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Iniciar Campana`;
        es.close();
        return;
      }

      total = json.total;
      progressSec.style.display = 'block';
      updateStats(0, 0, json.total, json.total);
    } catch (err) {
      showError('No se pudo conectar con el servidor');
      sendBtn.disabled = false;
      es.close();
    }
  });

  function downloadLog() {
    window.location.href = '/api/campaign/log';
  }

  // Reconnect SSE if a campaign is already running when page loads
  connectSSE();
</script>
</body>
</html>
